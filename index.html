  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Tahoma", "Noto Sans Arabic", "Arial", sans-serif;
    background:#0d1117; color:#e6edf3; min-height:100vh; padding:20px;
    font-size:14px; line-height:1.45;
  }
  html[dir="rtl"] body { font-size:14.5px; }

  /* control bar */
  .ctrl-bar {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:12px 16px; margin-bottom:18px;
    background:#161b22; border:1px solid #30363d; border-radius:10px;
  }
  .load-btn {
    padding:8px 20px; border:none; border-radius:7px; cursor:pointer;
    font-size:13px; font-weight:700; background:#58a6ff; color:#0d1117;
    transition:opacity .15s, transform .1s; font-family:inherit;
  }
  .load-btn:hover:not(:disabled) { opacity:.9; }
  .load-btn:active:not(:disabled) { transform:scale(.97); }
  .load-btn:disabled { opacity:.45; cursor:not-allowed; }
  .prog-wrap { flex:1; min-width:140px; height:5px; background:#30363d; border-radius:3px; overflow:hidden; }
  .prog-bar  { height:100%; width:0%; background:linear-gradient(90deg,#58a6ff,#3fb950); border-radius:3px; transition:width .25s; }
  html[dir="rtl"] .prog-bar { background:linear-gradient(270deg,#58a6ff,#3fb950); }
  .status-txt {
    font-size:12px; color:#8b949e; white-space:nowrap;
    min-width:200px; text-align:end;
  }

  /* language toggle */
  .lang-toggle {
    display:inline-flex; background:#0d1117; border:1px solid #30363d;
    border-radius:7px; padding:2px;
  }
  .lang-toggle button {
    padding:5px 11px; background:transparent; border:none; color:#8b949e;
    font-size:12px; font-weight:600; cursor:pointer; border-radius:5px;
    font-family:inherit; transition:color .15s, background .15s;
  }
  .lang-toggle button.active { background:#21262d; color:#e6edf3; }
  .lang-toggle button:hover:not(.active) { color:#e6edf3; }

  .err-box {
    color:#f85149; background:#161b22; border:1px solid #f85149;
    border-radius:8px; padding:14px 18px; font-size:13px; margin-bottom:16px;
  }

  /* layout */
  .section { margin-bottom:22px; }
  .section-title {
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    color:#8b949e; margin-bottom:10px; padding-inline-start:2px;
  }
  html[dir="rtl"] .section-title { letter-spacing:0; }

  /* KPI grid */
  .kpi-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
  }
  .kpi {
    background:#161b22; border:1px solid #30363d; border-radius:10px;
    padding:14px 16px; position:relative; overflow:hidden;
  }
  .kpi::before {
    content:""; position:absolute; inset-inline-start:0; top:0; bottom:0;
    width:3px; background:#58a6ff;
  }
  .kpi.pos::before { background:#3fb950; }
  .kpi.neg::before { background:#f85149; }
  .kpi.warn::before { background:#d29922; }
  .kpi.muted-accent::before { background:#6e7681; }
  .kpi-label { font-size:11px; color:#8b949e; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
  html[dir="rtl"] .kpi-label { letter-spacing:0; text-transform:none; font-weight:600; }
  .kpi-value { font-size:22px; font-weight:700; color:#e6edf3; font-variant-numeric:tabular-nums; }
  .kpi-sub { font-size:11px; color:#6e7681; margin-top:4px; font-variant-numeric:tabular-nums; }

  /* chart grid */
  .chart-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(380px,1fr));
    gap:14px;
  }
  .chart-card {
    background:#161b22; border:1px solid #30363d; border-radius:10px; padding:14px 16px;
  }
  .chart-card.full { grid-column:1/-1; }
  .chart-title {
    font-size:13px; font-weight:600; color:#e6edf3; margin-bottom:12px;
    display:flex; justify-content:space-between; align-items:baseline; gap:8px;
  }
  .chart-title small { font-size:11px; color:#6e7681; font-weight:400; }
  .chart-wrap { position:relative; height:280px; }
  .chart-wrap.tall { height:340px; }

  /* tables */
  .table-card {
    background:#161b22; border:1px solid #30363d; border-radius:10px; overflow:hidden;
  }
  table { width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
  th, td { padding:9px 14px; text-align:start; border-bottom:1px solid #21262d; }
  th {
    font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#8b949e;
    font-weight:600; background:#0d1117; position:sticky; top:0;
  }
  html[dir="rtl"] th { text-transform:none; letter-spacing:0; font-weight:700; }
  td { font-size:13px; color:#e6edf3; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr:hover { background:#1c2128; }
  td.num, th.num { text-align:end; }
  .badge {
    display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600;
  }
  .badge.critical { background:rgba(248,81,73,.15); color:#f85149; }
  .badge.warn     { background:rgba(210,153,34,.15); color:#d29922; }
  .badge.info     { background:rgba(88,166,255,.15); color:#58a6ff; }
  .badge.ok       { background:rgba(63,185,80,.15); color:#3fb950; }
  .muted { color:#6e7681; }

  .scroll-y { max-height:520px; overflow-y:auto; }
  .scroll-y.short { max-height:340px; }

  .empty-state {
    padding:40px 24px; text-align:center; color:#8b949e;
    background:#161b22; border:1px dashed #30363d; border-radius:10px;
  }
  .empty-state .big { font-size:36px; margin-bottom:8px; opacity:.4; }

  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:#0d1117; }
  ::-webkit-scrollbar-thumb { background:#30363d; border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:#484f58; }

  .truncate { max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:inline-block; vertical-align:middle; }

/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error(t('err.timeout')));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   Generic paginated batch fetcher
   Follows next_page_token until the
   API returns no more pages.
   DO NOT SIMPLIFY — Manager.io caps
   pages at 50 records each.
══════════════════════════════════ */
async function fetchBatch(endpoint, onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? endpoint + '?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : endpoint + '?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

async function getPurchaseInvoiceBatch(onProgress) { return fetchBatch('/api4/purchase-invoice-batch', onProgress); }
async function getSalesInvoiceBatch(onProgress)    { return fetchBatch('/api4/sales-invoice-batch',    onProgress); }
async function getInventoryItemBatch(onProgress)   { return fetchBatch('/api4/inventory-item-batch',   onProgress); }
async function getCustomerBatch(onProgress)        { return fetchBatch('/api4/customer-batch',        onProgress); }
async function getSupplierBatch(onProgress)        { return fetchBatch('/api4/supplier-batch',        onProgress); }
async function getCreditNoteBatch(onProgress)      { return fetchBatch('/api4/credit-note-batch',     onProgress); }
async function getDebitNoteBatch(onProgress)       { return fetchBatch('/api4/debit-note-batch',      onProgress); }
async function getInventoryWriteOffBatch(onProgress){ return fetchBatch('/api4/inventory-write-off-batch', onProgress); }
async function getProductionOrderBatch(onProgress) { return fetchBatch('/api4/production-order-batch', onProgress); }
async function getBomBatch(onProgress)             { return fetchBatch('/api4/bill-of-materials-batch', onProgress); }

const state = {
  lang: (localStorage.getItem('mgr-lang') === 'ar' ? 'ar' : 'en'),
  data: null
};

function t(key, ...args) {
  const dict = I18N[state.lang] || I18N.en;
  let s = (dict[key] ?? I18N.en[key] ?? key);
  args.forEach((v, i) => { s = s.replace(new RegExp('\\{' + i + '\\}', 'g'), v); });
  return s;
}

/* ══════════════════════════════════
   Formatting helpers
══════════════════════════════════ */
const numLocale  = 'en-US'; // Latin digits for numbers
const fmtNum  = v => (v == null || isNaN(v)) ? '—' : Number(v).toLocaleString(numLocale, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtInt  = v => (v == null || isNaN(v)) ? '—' : Number(v).toLocaleString(numLocale);
const fmtPct  = v => (v == null || isNaN(v) || !isFinite(v)) ? '—' : v.toFixed(1) + '%';
const fmtDate = v => {
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d)) return '—';
  const loc = state.lang === 'ar' ? 'ar-EG' : 'en-US';
  return d.toLocaleDateString(loc, { year: 'numeric', month: 'short', day: '2-digit', numberingSystem: 'latn' });
};
const fmtMonth = key => {
  if (!key || key === 'unknown') return '—';
  const [y, m] = key.split('-');
  const loc = state.lang === 'ar' ? 'ar-EG' : 'en-US';
  return new Date(+y, +m - 1, 1).toLocaleDateString(loc, { year: 'numeric', month: 'short', numberingSystem: 'latn' });
};
const dowLabels = () => {
  const loc = state.lang === 'ar' ? 'ar-EG' : 'en-US';
  // 0=Sun..6=Sat; pick reference dates that are known weekdays
  return [0,1,2,3,4,5,6].map(d => new Date(2024, 0, 7 + d).toLocaleDateString(loc, { weekday: 'short' }));
};
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
const truncate = (s, n) => { s = String(s ?? ''); return s.length > n ? s.slice(0, n) + '…' : s; };

function computeLineTotal(line, priceKey, fx) {
  const qty   = Number(line?.qty || 0);
  const unit  = Number(line?.[priceKey] || 0);
  const dPct  = Number(line?.discountPercentage || 0);
  const dAmt  = Number(line?.discountAmount || 0);
  const raw   = Math.max(0, qty * unit * (1 - dPct / 100) - dAmt);
  return raw * (fx == null ? 1 : fx);
}

/* Foreign-currency invoices carry exchangeRate; exchangeRate=0 means base currency (no conversion).
   When exchangeRateIsInverse is true the rate is foreign-per-base, so we divide; otherwise multiply. */
function fxFactor(invoice) {
  const xr = Number(invoice?.exchangeRate || 0);
  if (!xr) return 1;
  return invoice?.exchangeRateIsInverse ? (1 / xr) : xr;
}

   Language switching

function setLang(newLang) {
  if (newLang !== 'en' && newLang !== 'ar') newLang = 'en';
  state.lang = newLang;
  try { localStorage.setItem('mgr-lang', newLang); } catch (e) { /* private mode */ }
  document.documentElement.lang = newLang;
  document.documentElement.dir  = newLang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('#lang-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === newLang);
  });
  refreshStaticStrings();
  if (state.data) render(state.data);
}

function refreshStaticStrings() {
  const btn = document.getElementById('load-btn');
  const status = document.getElementById('status-txt');
  if (btn) {
    const map = { idle: 'btn.load', loading: 'btn.loading', reload: 'btn.reload', retry: 'btn.retry' };
    const k = map[btn.dataset.state || 'idle'];
    if (k) btn.textContent = t(k);
  }
  if (status && status.dataset.key === 'idle') status.textContent = t('status.idle');
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.dataset.state = 'loading';
  btn.textContent = t('btn.loading');
  status.dataset.key = 'progress';
  bar.style.width = '0%';
  app.innerHTML = '';

  const stages = [
    { name: 'purchases',    labelKey: 'stage.purchases',   fn: getPurchaseInvoiceBatch },
    { name: 'sales',        labelKey: 'stage.sales',       fn: getSalesInvoiceBatch    },
    { name: 'creditNotes',  labelKey: 'stage.creditNotes', fn: getCreditNoteBatch      },
    { name: 'debitNotes',   labelKey: 'stage.debitNotes',  fn: getDebitNoteBatch       },
    { name: 'writeOffs',    labelKey: 'stage.writeOffs',   fn: getInventoryWriteOffBatch },
    { name: 'production',   labelKey: 'stage.production',  fn: getProductionOrderBatch },
    { name: 'boms',         labelKey: 'stage.bom',         fn: getBomBatch, optional: true },
    { name: 'inventory',    labelKey: 'stage.inventory',   fn: getInventoryItemBatch   },
    { name: 'customerList', labelKey: 'stage.customers',   fn: getCustomerBatch        },
    { name: 'supplierList', labelKey: 'stage.suppliers',   fn: getSupplierBatch        }
  ];

  const result = {};

  try {
    for (let i = 0; i < stages.length; i++) {
      const s = stages[i];
      const onProg = (loaded, total, page) => {
        const stagePct = total ? Math.min(95, Math.round(loaded / total * 100)) : Math.min(95, page * 5);
        const overallPct = Math.round(((i + stagePct / 100) / stages.length) * 100);
        bar.style.width = overallPct + '%';
        status.textContent = total
          ? t('status.pageTotal', i+1, stages.length, t(s.labelKey), fmtInt(loaded), fmtInt(total), page)
          : t('status.page',      i+1, stages.length, t(s.labelKey), fmtInt(loaded), page);
      };
      try {
        result[s.name] = await s.fn(onProg);
      } catch (e) {
        if (s.optional) {
          console.warn(`[${s.name}] optional endpoint failed — continuing with empty:`, e.message);
          result[s.name] = [];
        } else {
          throw e;
        }
      }
    }

    bar.style.width = '100%';
    status.textContent = t('status.complete',
      fmtInt(result.purchases.length),
      fmtInt(result.sales.length),
      fmtInt(((result.creditNotes || []).length) + ((result.debitNotes || []).length)),
      fmtInt(result.inventory.length),
      fmtInt((result.customerList || []).length),
      fmtInt((result.supplierList || []).length)
    );
    btn.dataset.state = 'reload';
    btn.textContent = t('btn.reload');
    btn.disabled = false;
    state.data = result;
    render(result);

  } catch (err) {
    console.error(err);
    status.textContent = '⚠ ' + err.message;
    btn.dataset.state = 'retry';
    btn.textContent = t('btn.retry');
    btn.disabled = false;
    app.innerHTML = `<div class="err-box"><strong>${esc(t('err.title'))}</strong><br>${esc(err.message)}<br><small style="color:#8b949e">${esc(t('err.hint'))}</small></div>`;
  }
}

/* ══════════════════════════════════
   processData(rawData) — derive all
   aggregates needed for rendering.
══════════════════════════════════ */
function processData(data) {
  const purchases     = data.purchases     || [];
  const sales         = data.sales         || [];
  const creditNotes   = data.creditNotes   || [];   // sales returns
  const debitNotes    = data.debitNotes    || [];   // purchase returns
  const writeOffs     = data.writeOffs     || [];   // inventory write-offs
  const production    = data.production    || [];   // production orders
  const boms          = data.boms          || [];   // bill of materials
  const inventory     = data.inventory     || [];
  const customerList  = data.customerList  || [];
  const supplierList  = data.supplierList  || [];

  /* Inventory lookup */
  const invMap = new Map();
  inventory.forEach(rec => {
    const key = rec?.key ?? rec?.id;
    const it  = rec?.item ?? rec;
    if (key) invMap.set(key, it || {});
  });

  /* Customer / supplier name lookups */
  const partyName = (it) => it?.name || it?.nameWithCode || it?.text || it?.uniqueName || null;
  const customerNames = new Map();
  customerList.forEach(rec => {
    const key = rec?.key ?? rec?.id;
    const it  = rec?.item ?? rec;
    if (key) customerNames.set(key, partyName(it));
  });
  const supplierNames = new Map();
  supplierList.forEach(rec => {
    const key = rec?.key ?? rec?.id;
    const it  = rec?.item ?? rec;
    if (key) supplierNames.set(key, partyName(it));
  });

  /* Per-item aggregates */
  const stats = new Map();
  const ensureStats = uuid => {
    if (!stats.has(uuid)) {
      stats.set(uuid, {
        uuid, soldQty: 0, soldRevenue: 0, purchasedQty: 0, purchasedCost: 0,
        salesCount: 0, purchaseCount: 0, lastSale: null, lastPurchase: null,
        producedQty: 0, consumedQty: 0, writtenOffQty: 0
      });
    }
    return stats.get(uuid);
  };

  /* Monthly buckets */
  const monthly = new Map();
  const ensureMonth = key => {
    if (!monthly.has(key)) monthly.set(key, { sales: 0, purchases: 0, salesCount: 0, purchaseCount: 0 });
    return monthly.get(key);
  };

  const suppliers = new Map();
  const customers = new Map();

  /* Day of week buckets: 0=Sun..6=Sat */
  const dow = Array.from({length:7}, () => ({ sales: 0, purchases: 0, salesCount: 0, purchaseCount: 0 }));

  let totalSales = 0;
  let totalPurchases = 0;
  let earliestDate = null;
  let latestDate   = null;

  /* sales */
  sales.forEach(rec => {
    const it   = rec?.item ?? rec;
    const date = it?.issueDate || null;
    const monthKey = date ? String(date).substring(0, 7) : 'unknown';
    const m = ensureMonth(monthKey);
    const fx = fxFactor(it);
    m.salesCount++;

    if (date) {
      if (!earliestDate || date < earliestDate) earliestDate = date;
      if (!latestDate   || date > latestDate)   latestDate   = date;
      const wd = new Date(date).getDay();
      if (!isNaN(wd)) dow[wd].salesCount++;
    }

    const cust = it?.customer;
    if (cust) {
      if (!customers.has(cust)) customers.set(cust, { revenue: 0, count: 0, lastDate: null });
      customers.get(cust).count++;
      if (date && (!customers.get(cust).lastDate || date > customers.get(cust).lastDate)) customers.get(cust).lastDate = date;
    }

    let invoiceTotal = 0;
    (it?.lines || []).forEach(line => {
      const tot = computeLineTotal(line, 'salesUnitPrice', fx);
      invoiceTotal += tot;
      m.sales += tot;
      if (date) {
        const wd = new Date(date).getDay();
        if (!isNaN(wd)) dow[wd].sales += tot;
      }

      const itemId = line?.item;
      if (itemId) {
        const s = ensureStats(itemId);
        s.soldQty     += Number(line?.qty || 0);
        s.soldRevenue += tot;
        s.salesCount  += 1;
        if (date && (!s.lastSale || date > s.lastSale)) s.lastSale = date;
      }
    });
    if (cust) customers.get(cust).revenue += invoiceTotal;
    totalSales += invoiceTotal;
  });

  /* purchases */
  purchases.forEach(rec => {
    const it   = rec?.item ?? rec;
    const date = it?.issueDate || null;
    const monthKey = date ? String(date).substring(0, 7) : 'unknown';
    const m = ensureMonth(monthKey);
    const fx = fxFactor(it);
    m.purchaseCount++;

    if (date) {
      if (!earliestDate || date < earliestDate) earliestDate = date;
      if (!latestDate   || date > latestDate)   latestDate   = date;
      const wd = new Date(date).getDay();
      if (!isNaN(wd)) dow[wd].purchaseCount++;
    }

    const supp = it?.supplier;
    if (supp) {
      if (!suppliers.has(supp)) suppliers.set(supp, { spend: 0, count: 0, lastDate: null });
      suppliers.get(supp).count++;
      if (date && (!suppliers.get(supp).lastDate || date > suppliers.get(supp).lastDate)) suppliers.get(supp).lastDate = date;
    }

    let invoiceTotal = 0;
    (it?.lines || []).forEach(line => {
      const tot = computeLineTotal(line, 'purchaseUnitPrice', fx);
      invoiceTotal += tot;
      m.purchases += tot;
      if (date) {
        const wd = new Date(date).getDay();
        if (!isNaN(wd)) dow[wd].purchases += tot;
      }

      const itemId = line?.item;
      if (itemId) {
        const s = ensureStats(itemId);
        s.purchasedQty  += Number(line?.qty || 0);
        s.purchasedCost += tot;
        s.purchaseCount += 1;
        if (date && (!s.lastPurchase || date > s.lastPurchase)) s.lastPurchase = date;
      }
    });
    if (supp) suppliers.get(supp).spend += invoiceTotal;
    totalPurchases += invoiceTotal;
  });

  /* credit notes — sales returns: reverse soldQty/revenue/customer revenue */
  creditNotes.forEach(rec => {
    const it   = rec?.item ?? rec;
    const date = it?.issueDate || null;
    const monthKey = date ? String(date).substring(0, 7) : 'unknown';
    const m = ensureMonth(monthKey);
    const fx = fxFactor(it);

    const cust = it?.customer;

    let returnTotal = 0;
    (it?.lines || []).forEach(line => {
      const tot = computeLineTotal(line, 'salesUnitPrice', fx);
      returnTotal += tot;
      m.sales -= tot;

      const itemId = line?.item;
      if (itemId) {
        const s = ensureStats(itemId);
        s.soldQty     -= Number(line?.qty || 0);
        s.soldRevenue -= tot;
      }
    });
    if (cust && customers.has(cust)) customers.get(cust).revenue -= returnTotal;
    totalSales -= returnTotal;
  });

  /* debit notes — purchase returns: reverse purchasedQty/cost/supplier spend */
  debitNotes.forEach(rec => {
    const it   = rec?.item ?? rec;
    const date = it?.issueDate || null;
    const monthKey = date ? String(date).substring(0, 7) : 'unknown';
    const m = ensureMonth(monthKey);
    const fx = fxFactor(it);

    const supp = it?.supplier;

    let returnTotal = 0;
    (it?.lines || []).forEach(line => {
      const tot = computeLineTotal(line, 'purchaseUnitPrice', fx);
      returnTotal += tot;
      m.purchases -= tot;

      const itemId = line?.item;
      if (itemId) {
        const s = ensureStats(itemId);
        s.purchasedQty  -= Number(line?.qty || 0);
        s.purchasedCost -= tot;
      }
    });
    if (supp && suppliers.has(supp)) suppliers.get(supp).spend -= returnTotal;
    totalPurchases -= returnTotal;
  });

  /* inventory write-offs — pure stock reduction (not demand, not money) */
  writeOffs.forEach(rec => {
    const it = rec?.item ?? rec;
    (it?.items || []).forEach(line => {
      const itemId = line?.inventoryItem;
      if (!itemId) return;
      const s = ensureStats(itemId);
      s.writtenOffQty += Number(line?.qty || 0);
    });
  });

  /* Build a lookup of BOM definitions: bomId → array of { inventoryItem, qty } needed per 1 unit produced.
     Schema varies; we try a couple of plausible field names defensively. */
  const bomMap = new Map();
  boms.forEach(rec => {
    const key = rec?.key ?? rec?.id;
    const it  = rec?.item ?? rec;
    if (!key) return;
    const lines = it?.lines || it?.billOfMaterialsItems || it?.items || [];
    const materials = lines
      .map(l => ({
        inventoryItem: l?.inventoryItem ?? l?.item ?? l?.billOfMaterialsItem ?? null,
        qty: Number(l?.qty || 0)
      }))
      .filter(m => m.inventoryItem && m.qty > 0);
    if (materials.length) bomMap.set(key, materials);
  });

  /* production orders — add finished qty, subtract raw materials via BOM lookup */
  production.forEach(rec => {
    const it = rec?.item ?? rec;
    const finishedItem = it?.finishedInventoryItem;
    const producedQty  = Number(it?.qty || 0);

    if (finishedItem && producedQty > 0) {
      ensureStats(finishedItem).producedQty += producedQty;
    }

    (it?.billOfMaterials || []).forEach(line => {
      const bomMultiplier = Number(line?.qty || 1);
      const bomRefId      = line?.billOfMaterials;
      const materials     = bomRefId ? bomMap.get(bomRefId) : null;
      if (materials) {
        materials.forEach(m => {
          ensureStats(m.inventoryItem).consumedQty += m.qty * bomMultiplier * producedQty;
        });
      }
      // If BOM endpoint isn't available, raw material consumption can't be computed
      // — finished output is still tracked, so net stock estimate is partial but conservative.
    });
  });

  return {
    purchases, sales, creditNotes, debitNotes, writeOffs, production, boms,
    inventory, customerList, supplierList,
    invMap, customerNames, supplierNames,
    stats, monthly, suppliers, customers, dow,
    totals: {
      sales: totalSales,
      purchases: totalPurchases,
      grossMargin: totalSales - totalPurchases,
      marginPct: totalSales > 0 ? ((totalSales - totalPurchases) / totalSales) * 100 : 0
    },
    earliestDate, latestDate
  };
}

/* ══════════════════════════════════
   render(rawData) — main dashboard
══════════════════════════════════ */
function render(data) {
  const app = document.getElementById('app');
  const ctx = processData(data);

  if (!ctx.purchases.length && !ctx.sales.length && !ctx.inventory.length) {
    app.innerHTML = `<div class="empty-state"><div class="big">∅</div><div>${esc(t('empty.noData'))}</div></div>`;
    return;
  }

  const { invMap, customerNames, supplierNames, stats, monthly, suppliers, customers, dow, totals } = ctx;
  const customerLabel = uuid => customerNames.get(uuid) || (uuid ? (uuid.slice(0, 8) + '…') : '—');
  const supplierLabel = uuid => supplierNames.get(uuid) || (uuid ? (uuid.slice(0, 8) + '…') : '—');
  /* Net stock: purchases (gross) + production output − sales (net of returns) − write-offs − BOM consumption.
     Sales/purchase fields already incorporate credit/debit-note returns from processData. */
  const estStockOf = s => (s.purchasedQty || 0) + (s.producedQty || 0) - (s.soldQty || 0) - (s.writtenOffQty || 0) - (s.consumedQty || 0);
  const monthKeys = [...monthly.keys()].filter(k => k !== 'unknown').sort();
  const periodMonths = monthKeys.length || 1;

  /* Reorder recommendations */
  const recommendations = [];
  stats.forEach(s => {
    if (s.soldQty <= 0) return;
    const inv = invMap.get(s.uuid) || {};
    const netFlow = estStockOf(s);
    const monthlyVelocity = s.soldQty / periodMonths;
    const monthsOfCover = monthlyVelocity > 0 ? netFlow / monthlyVelocity : Infinity;

    let urgency = 'ok';
    if (netFlow <= 0)                urgency = 'critical';
    else if (monthsOfCover < 0.5)    urgency = 'critical';
    else if (monthsOfCover < 1.5)    urgency = 'warn';
    else if (monthsOfCover < 3)      urgency = 'info';
    else                             urgency = 'ok';

    if (urgency === 'ok' && !inv.reorderPoint) return;

    const desired = Number(inv.qtyDesired || 0);
    const suggestedQty = Math.max(desired, Math.ceil(monthlyVelocity * 2 - Math.max(0, netFlow)));

    recommendations.push({
      uuid: s.uuid,
      name: inv.itemName || inv.nameWithCode || t('item.unknown'),
      unit: inv.unitName || '',
      soldQty: s.soldQty, purchasedQty: s.purchasedQty,
      netFlow, monthlyVelocity, monthsOfCover,
      lastSale: s.lastSale, lastPurchase: s.lastPurchase,
      urgency,
      suggestedQty: Math.max(1, suggestedQty),
      defaultPurchasePrice: Number(inv.defaultPurchaseUnitPrice || 0),
      estimatedCost: Math.max(1, suggestedQty) * Number(inv.defaultPurchaseUnitPrice || 0)
    });
  });

  const urgencyRank = { critical: 0, warn: 1, info: 2, ok: 3 };
  recommendations.sort((a, b) => {
    if (urgencyRank[a.urgency] !== urgencyRank[b.urgency]) return urgencyRank[a.urgency] - urgencyRank[b.urgency];
    return a.monthsOfCover - b.monthsOfCover;
  });

  /* Per-item arrays */
  const itemArr = [...stats.values()].map(s => {
    const inv = invMap.get(s.uuid) || {};
    return {
      ...s,
      name: inv.itemName || t('item.unknown'),
      unit: inv.unitName || ''
    };
  });
  const topSellers   = [...itemArr].sort((a, b) => b.soldRevenue   - a.soldRevenue).slice(0, 10);
  const topPurchased = [...itemArr].sort((a, b) => b.purchasedCost - a.purchasedCost).slice(0, 10);

  /* Margin: revenue − implied COGS (avg purchase price × sold qty) */
  const profitable = itemArr
    .map(s => {
      if (s.soldQty <= 0 || s.purchasedQty <= 0) return null;
      const avgPurchasePrice = s.purchasedCost / s.purchasedQty;
      const margin = s.soldRevenue - (avgPurchasePrice * s.soldQty);
      const marginPct = s.soldRevenue > 0 ? (margin / s.soldRevenue) * 100 : 0;
      return { ...s, avgPurchasePrice, margin, marginPct };
    })
    .filter(x => x && isFinite(x.margin))
    .sort((a, b) => b.margin - a.margin)
    .slice(0, 10);

  /* Slow movers: inventory items active but with no recent sale OR very low velocity */
  const slowMovers = [];
  const latestDate = ctx.latestDate;
  const cutoff = latestDate ? new Date(new Date(latestDate).getTime() - 60 * 86400000) : null;
  invMap.forEach((inv, uuid) => {
    if (inv.inactive) return;
    const s = stats.get(uuid) || {};
    const lastSale = s.lastSale ? new Date(s.lastSale) : null;
    const noRecent = !lastSale || (cutoff && lastSale < cutoff);
    if (noRecent && (s.purchasedQty > 0 || (s.soldQty || 0) === 0)) {
      slowMovers.push({
        name: inv.itemName || t('item.unknown'),
        unit: inv.unitName || '',
        purchasedQty: s.purchasedQty || 0,
        purchasedCost: s.purchasedCost || 0,
        soldQty: s.soldQty || 0,
        lastSale: s.lastSale,
        lastPurchase: s.lastPurchase
      });
    }
  });
  slowMovers.sort((a, b) => (b.purchasedCost || 0) - (a.purchasedCost || 0));

  /* Top customers / suppliers */
  const customerArr = [...customers.entries()]
    .map(([uuid, c]) => ({ uuid, ...c }))
    .sort((a, b) => b.revenue - a.revenue);
  const supplierArr = [...suppliers.entries()]
    .map(([uuid, s]) => ({ uuid, ...s }))
    .sort((a, b) => b.spend - a.spend);

  /* Coverage distribution */
  const covBuckets = [
    { key: 'depleted', label: t('cov.depleted'), color: '#f85149', count: 0 },
    { key: 'lt1',      label: t('cov.lt1'),      color: '#d29922', count: 0 },
    { key: '1to3',     label: t('cov.1to3'),     color: '#58a6ff', count: 0 },
    { key: '3to6',     label: t('cov.3to6'),     color: '#3fb950', count: 0 },
    { key: 'gt6',      label: t('cov.gt6'),      color: '#7d8590', count: 0 }
  ];
  itemArr.forEach(s => {
    if (s.soldQty <= 0) return;
    const v = s.soldQty / periodMonths;
    const netFlow = estStockOf(s);
    const cover = v > 0 ? netFlow / v : Infinity;
    if (netFlow <= 0) covBuckets[0].count++;
    else if (cover < 1) covBuckets[1].count++;
    else if (cover < 3) covBuckets[2].count++;
    else if (cover < 6) covBuckets[3].count++;
    else covBuckets[4].count++;
  });

  /* Counts */
  const reorderItemCount = ctx.inventory.reduce((n, rec) => n + ((rec?.item ?? rec)?.reorderPoint ? 1 : 0), 0);
  const inactiveCount    = ctx.inventory.reduce((n, rec) => n + ((rec?.item ?? rec)?.inactive ? 1 : 0), 0);
  const activeItems      = ctx.inventory.length - inactiveCount;
  const criticalCount    = recommendations.filter(r => r.urgency === 'critical').length;
  const warnCount        = recommendations.filter(r => r.urgency === 'warn').length;
  const avgSale          = ctx.sales.length ? totals.sales / ctx.sales.length : 0;
  const avgPurchase      = ctx.purchases.length ? totals.purchases / ctx.purchases.length : 0;

  /* ══════════════════════════════════
     Shortage forecast — last 30 days vs next 30 days
     ────────────────────────────────────
     For each item with sales in the last 30 days, assume the same
     volume repeats in the next 30 days. Compare against estimated
     stock (purchased − sold). Show only items where forecast > stock.
  ══════════════════════════════════ */
  const refDate = ctx.latestDate ? new Date(ctx.latestDate) : new Date(ctx.earliestDate || '2026-01-01');
  const thirtyDaysAgo = new Date(refDate.getTime() - 30 * 86400000);

  const last30ByItem = new Map();
  const accumulate30 = (rec, sign) => {
    const it = rec?.item ?? rec;
    const d  = it?.issueDate ? new Date(it.issueDate) : null;
    if (!d || isNaN(d) || d < thirtyDaysAgo || d > refDate) return;
    (it?.lines || []).forEach(line => {
      if (line?.item) last30ByItem.set(line.item, (last30ByItem.get(line.item) || 0) + sign * Number(line?.qty || 0));
    });
  };
  ctx.sales.forEach(r => accumulate30(r, +1));
  (ctx.creditNotes || []).forEach(r => accumulate30(r, -1));  // returns reduce net demand

  const shortageRows = [];
  stats.forEach(s => {
    const sold30 = last30ByItem.get(s.uuid) || 0;
    if (sold30 <= 0) return;                       // no recent activity → skip
    const estStock = estStockOf(s);
    const forecast30 = sold30;                     // same rate repeats
    const shortage = Math.max(0, forecast30 - Math.max(0, estStock));
    if (shortage <= 0) return;                     // stock covers forecast → no warning needed
    const inv = invMap.get(s.uuid) || {};
    shortageRows.push({
      uuid: s.uuid,
      name: inv.itemName || t('item.unknown'),
      unit: inv.unitName || '',
      sold30, forecast30, estStock, shortage
    });
  });
  shortageRows.sort((a, b) => b.shortage - a.shortage);

  const shortageRiskCount = shortageRows.length;

    <!-- CUSTOMERS & SUPPLIERS -->

                  topPurchased.map(s => `

  /* Sales vs Purchases */
  if (monthKeys.length) {
    mountChart('chart-monthly', {
      type: 'line',
      data: {
        labels: monthLabels,
        datasets: [
          { label: t('chart.sales'),     data: salesSeries,     borderColor: '#3fb950', backgroundColor: 'rgba(63,185,80,.18)',  tension: .3, fill: true, pointRadius: 3, pointHoverRadius: 5 },
          { label: t('chart.purchases'), data: purchasesSeries, borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,.15)', tension: .3, fill: true, pointRadius: 3, pointHoverRadius: 5 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { color: '#e6edf3' } },
          tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmtNum(ctx.parsed.y)}` } }
        },
        scales: {
          x: { grid: { color: '#21262d' } },
          y: { grid: { color: '#21262d' }, ticks: { callback: v => fmtInt(v) }, position: yPos() }
        }
      }
    });
  }

  /* Cumulative cash flow */
  if (monthKeys.length) {
    let running = 0;
    const cumulative = monthKeys.map(k => {
      const mm = monthly.get(k);
      running += (mm.sales - mm.purchases);
      return running;
    });
    /* color the area positive/negative — use a single dataset with conditional fill */
    const minVal = Math.min(0, ...cumulative);
    mountChart('chart-cashflow', {
      type: 'line',
      data: {
        labels: monthLabels,
        datasets: [{
          label: t('chart.net'),
          data: cumulative,
          borderColor: '#58a6ff',
          backgroundColor: ctx => {
            const c = ctx.chart.ctx;
            const g = c.createLinearGradient(0, 0, 0, ctx.chart.height);
            g.addColorStop(0, 'rgba(63,185,80,.4)');
            g.addColorStop(0.5, 'rgba(88,166,255,.15)');
            g.addColorStop(1, 'rgba(248,81,73,.4)');
            return g;
          },
          tension: .3, fill: true, pointRadius: 3, pointHoverRadius: 5,
          segment: {
            borderColor: ctx => (ctx.p1.parsed.y >= 0 ? '#3fb950' : '#f85149')
          }
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => `${t('chart.net')}: ${fmtNum(ctx.parsed.y)}` } }
        },
        scales: {
          x: { grid: { color: '#21262d' } },
          y: {
            grid: { color: '#21262d' }, ticks: { callback: v => fmtInt(v) }, position: yPos(),
            suggestedMin: minVal < 0 ? minVal * 1.1 : 0
          }
        }
      }
    });
  }

  /* Invoice volume */
  if (monthKeys.length) {
    mountChart('chart-volume', {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [
          { label: t('chart.salesInvoices'),    data: salesCountSeries,    backgroundColor: '#3fb950', borderRadius: 4 },
          { label: t('chart.purchaseInvoices'), data: purchaseCountSeries, backgroundColor: '#58a6ff', borderRadius: 4 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { color: '#e6edf3' } } },
        scales: {
          x: { grid: { color: '#21262d' } },
          y: { grid: { color: '#21262d' }, ticks: { stepSize: 1 }, position: yPos() }
        }
      }
    });
  }

  /* Day-of-week activity */
  {
    mountChart('chart-dow', {
      type: 'bar',
      data: {
        labels: dowLabels(),
        datasets: [
          { label: t('chart.sales'),     data: dow.map(d => d.sales),     backgroundColor: '#3fb950', borderRadius: 4 },
          { label: t('chart.purchases'), data: dow.map(d => d.purchases), backgroundColor: '#58a6ff', borderRadius: 4 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { color: '#e6edf3' } },
          tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmtNum(ctx.parsed.y)}` } }
        },
        scales: {
          x: { grid: { color: '#21262d' } },
          y: { grid: { color: '#21262d' }, ticks: { callback: v => fmtInt(v) }, position: yPos() }
        }
      }
    });
  }

  /* Top sellers */
  if (topSellers.length) {
    mountChart('chart-top-sellers', {
      type: 'bar',
      data: {
        labels: topSellers.map(s => truncate(s.name, 24)),
        datasets: [{ label: t('chart.revenue'), data: topSellers.map(s => s.soldRevenue), backgroundColor: '#3fb950', borderRadius: 4 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${t('chart.revenue')}: ${fmtNum(ctx.parsed.x)}` } } },
        scales: {
          x: { grid: { color: '#21262d' }, ticks: { callback: v => fmtInt(v) }, position: xPos() },
          y: { grid: { display: false }, position: yPos() }
        }
      }
    });
  }

  /* Top purchased */
  if (topPurchased.length) {
    mountChart('chart-top-purchased', {
      type: 'bar',
      data: {
        labels: topPurchased.map(s => truncate(s.name, 24)),
        datasets: [{ label: t('chart.spend'), data: topPurchased.map(s => s.purchasedCost), backgroundColor: '#58a6ff', borderRadius: 4 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${t('chart.spend')}: ${fmtNum(ctx.parsed.x)}` } } },
        scales: {
          x: { grid: { color: '#21262d' }, ticks: { callback: v => fmtInt(v) }, position: xPos() },
          y: { grid: { display: false }, position: yPos() }
        }
      }
    });
  }

  /* Most profitable */
  if (profitable.length) {
    mountChart('chart-profitable', {
      type: 'bar',
      data: {
        labels: profitable.map(p => truncate(p.name, 24)),
        datasets: [{
          label: t('chart.margin'),
          data: profitable.map(p => p.margin),
          backgroundColor: profitable.map(p => p.margin >= 0 ? '#3fb950' : '#f85149'),
          borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => {
            const p = profitable[ctx.dataIndex];
            return `${t('chart.margin')}: ${fmtNum(p.margin)} (${fmtPct(p.marginPct)})`;
          } } }
        },
        scales: {
          x: { grid: { color: '#21262d' }, ticks: { callback: v => fmtInt(v) }, position: xPos() },
          y: { grid: { display: false }, position: yPos() }
        }
      }
    });
  }

  /* Coverage distribution */
  {
    mountChart('chart-coverage', {
      type: 'bar',
      data: {
        labels: covBuckets.map(b => b.label),
        datasets: [{
          data: covBuckets.map(b => b.count),
          backgroundColor: covBuckets.map(b => b.color),
          borderRadius: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.parsed.y} ${t('chart.items')}` } } },
        scales: {
          x: { grid: { display: false } },
          y: { grid: { color: '#21262d' }, ticks: { stepSize: 1, precision: 0 }, position: yPos() }
        }
      }
    });
  }

  /* Top customers */
  if (customerArr.length) {
    const top = customerArr.slice(0, 10);
    mountChart('chart-customers', {
      type: 'bar',
      data: {
        labels: top.map(c => truncate(customerLabel(c.uuid), 28)),
        datasets: [{ label: t('chart.revenue'), data: top.map(c => c.revenue), backgroundColor: '#3fb950', borderRadius: 4 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => `${t('chart.revenue')}: ${fmtNum(ctx.parsed.x)}`, title: ctx => customerLabel(top[ctx[0].dataIndex].uuid) } }
        },
        scales: {
          x: { grid: { color: '#21262d' }, ticks: { callback: v => fmtInt(v) }, position: xPos() },
          y: { grid: { display: false }, position: yPos() }
        }
      }
    });
  }

  /* Top suppliers */
  if (supplierArr.length) {
    const top = supplierArr.slice(0, 10);
    mountChart('chart-suppliers', {
      type: 'bar',
      data: {
        labels: top.map(s => truncate(supplierLabel(s.uuid), 28)),
        datasets: [{ label: t('chart.spend'), data: top.map(s => s.spend), backgroundColor: '#58a6ff', borderRadius: 4 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => `${t('chart.spend')}: ${fmtNum(ctx.parsed.x)}`, title: ctx => supplierLabel(top[ctx[0].dataIndex].uuid) } }
        },
        scales: {
          x: { grid: { color: '#21262d' }, ticks: { callback: v => fmtInt(v) }, position: xPos() },
          y: { grid: { display: false }, position: yPos() }
        }
      }
    });
  }

  /* Urgency doughnut */
  const urgencyCounts = {
    critical: recommendations.filter(r => r.urgency === 'critical').length,
    warn:     recommendations.filter(r => r.urgency === 'warn').length,
    info:     recommendations.filter(r => r.urgency === 'info').length,
    ok:       recommendations.filter(r => r.urgency === 'ok').length
  };
  const hasUrgencyData = Object.values(urgencyCounts).some(v => v > 0);
  if (hasUrgencyData) {
    mountChart('chart-urgency', {
      type: 'doughnut',
      data: {
        labels: [t('badge.critical'), t('badge.warn'), t('badge.info'), t('badge.ok')],
        datasets: [{
          data: [urgencyCounts.critical, urgencyCounts.warn, urgencyCounts.info, urgencyCounts.ok],
          backgroundColor: ['#f85149', '#d29922', '#58a6ff', '#3fb950'],
          borderColor: '#0d1117', borderWidth: 2
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: state.lang === 'ar' ? 'left' : 'right', labels: { color: '#e6edf3', boxWidth: 12 } } },
        cutout: '60%'
      }
    });
  } else {
    const elem = document.getElementById('chart-urgency');
    if (elem) elem.parentElement.innerHTML = `<div class="empty-state" style="border:none;background:transparent;height:100%;display:flex;flex-direction:column;justify-content:center"><div class="big">✓</div><div>${esc(t('empty.allHealthy'))}</div></div>`;
  }
}

/* ══════════════════════════════════
   Bootstrap
══════════════════════════════════ */
document.querySelectorAll('#lang-toggle button').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.lang));
});
setLang(state.lang);
</script>
</body>
</html>
